# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci --include=optional
    - name: Ensure Tailwind native binding
      run: |
        OXIDE_VERSION=$(node -p "require('./node_modules/@tailwindcss/oxide/package.json').version")
        npm install --no-save "@tailwindcss/oxide-linux-x64-gnu@${OXIDE_VERSION}"
        node -e "require('@tailwindcss/oxide')"
    - run: npm run build --if-present
    - run: npm test --if-present
